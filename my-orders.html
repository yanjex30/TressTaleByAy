<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - TressTale</title>
    <link rel="stylesheet" href="./CSS/styles.css">
    <style>
        .orders-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        .orders-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .orders-header h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 10px;
        }

        .order-card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
        }

        .order-id {
            font-weight: 600;
            color: #667eea;
            font-size: 16px;
        }

        .order-date {
            color: #666;
            font-size: 14px;
        }

        .order-status {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-confirmed {
            background: #d4edda;
            color: #155724;
        }

        .status-shipped {
            background: #d1ecf1;
            color: #0c5460;
        }

        .status-delivered {
            background: #d4edda;
            color: #155724;
        }

        .order-items {
            margin: 15px 0;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .item-row:last-child {
            border-bottom: none;
        }

        .item-name {
            flex: 1;
            font-weight: 500;
            color: #333;
        }

        .item-qty {
            color: #666;
            margin: 0 15px;
        }

        .item-price {
            font-weight: 600;
            color: #667eea;
            min-width: 80px;
            text-align: right;
        }

        .order-total {
            text-align: right;
            padding-top: 15px;
            border-top: 2px solid #f0f0f0;
            margin-top: 15px;
        }

        .order-total-amount {
            font-size: 20px;
            font-weight: 700;
            color: #667eea;
        }

        .order-address {
            background: #f9f9f9;
            padding: 10px 15px;
            border-radius: 5px;
            margin-top: 15px;
            font-size: 13px;
            color: #666;
        }

        .no-orders {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .no-orders-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .no-orders h2 {
            margin-bottom: 10px;
            color: #333;
        }

        .shop-btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 30px;
            border-radius: 5px;
            text-decoration: none;
            margin-top: 20px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .shop-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .back-btn:hover {
            text-decoration: underline;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #667eea;
            font-size: 18px;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .filter-btn:hover {
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <header class="navbar">
        <div class="container">
            <div class="logo-section">
                <h1 class="logo">✨ TressTaleByAy</h1>
                <p class="tagline">Luxury Wigs & Signature Perfumes</p>
            </div>
            <nav class="nav-menu">
                <a href="./home.html" class="nav-link">Home</a>
                <a href="./wigs.html" class="nav-link">Wigs</a>
                <a href="./perfumes.html" class="nav-link">Perfumes</a>
                <a href="./about.html" class="nav-link">About</a>
                <a href="./contact.html" class="nav-link">Contact</a>
            </nav>
            <div class="header-actions">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search products..." class="search-input">
                    <button class="search-btn">🔍</button>
                </div>
                <button class="cart-btn" onclick="window.location.href='home.html'">
                    🏠 Back Home
                </button>
                <div class="auth-section" id="authSection"></div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="orders-container">
        <a href="home.html" class="back-btn">← Back to Home</a>

        <div class="orders-header">
            <h1>📦 My Orders</h1>
            <p>Track and manage your orders</p>
        </div>

        <div class="filters" id="filters" style="display: none;">
            <button class="filter-btn active" onclick="filterOrders('all')">All Orders</button>
            <button class="filter-btn" onclick="filterOrders('Pending')">Pending</button>
            <button class="filter-btn" onclick="filterOrders('Confirmed')">Confirmed</button>
            <button class="filter-btn" onclick="filterOrders('Shipped')">Shipped</button>
            <button class="filter-btn" onclick="filterOrders('Delivered')">Delivered</button>
        </div>

        <div id="errorMessage" class="error-message" style="display: none;"></div>

        <div id="ordersContent">
            <div class="loading">Loading your orders...</div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 TressTaleByAy. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="./JSC/auth.js"></script>
    <script>
        const API_BASE_URL = 'https://tresstle-backend.onrender.com/api';

        let allOrders = [];
        let currentFilter = 'all';

        // Check authentication
        function checkAuth() {
            if (!isLoggedIn()) {
                window.location.href = 'login.html';
                return false;
            }
            return true;
        }

        // Load orders
        async function loadOrders() {
            try {
                if (!checkAuth()) return;

                const response = await apiCall('/orders/my-orders', {
                    method: 'GET'
                });

                allOrders = response.orders || [];
                displayOrders(allOrders);
            } catch (error) {
                showError(error.message);
            }
        }

        // Display orders
        function displayOrders(orders) {
            const content = document.getElementById('ordersContent');

            if (orders.length === 0) {
                content.innerHTML = `
                    <div class="no-orders">
                        <div class="no-orders-icon">📭</div>
                        <h2>No orders yet</h2>
                        <p>Start shopping and your orders will appear here</p>
                        <a href="wigs.html" class="shop-btn">Shop Now</a>
                    </div>
                `;
                return;
            }

            content.innerHTML = orders.map(order => `
                <div class="order-card">
                    <div class="order-header">
                        <div>
                            <div class="order-id">Order ID: ${order.id}</div>
                            <div class="order-date">${new Date(order.createdAt).toLocaleDateString('en-US', {
                                year: 'numeric',
                                month: 'long',
                                day: 'numeric'
                            })}</div>
                        </div>
                        <span class="order-status status-${order.status.toLowerCase()}">${order.status}</span>
                    </div>

                    <div class="order-items">
                        ${order.items.map(item => `
                            <div class="item-row">
                                <div class="item-name">${item.name}</div>
                                <div class="item-qty">Qty: ${item.quantity}</div>
                                <div class="item-price">₦${item.price.toLocaleString()}</div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="order-total">
                        <div class="order-total-amount">Total: ₦${order.totalAmount.toLocaleString()}</div>
                    </div>

                    ${order.shippingAddress ? `
                        <div class="order-address">
                            <strong>Shipping Address:</strong><br>
                            ${order.shippingAddress}
                        </div>
                    ` : ''}
                </div>
            `).join('');

            document.getElementById('filters').style.display = 'flex';
        }

        // Filter orders
        function filterOrders(status) {
            currentFilter = status;
            
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Filter and display
            const filtered = status === 'all' 
                ? allOrders 
                : allOrders.filter(o => o.status === status);
            
            displayOrders(filtered);
        }

        // Show error
        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            setTimeout(() => {
                errorEl.style.display = 'none';
            }, 5000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateAuthUI();
            if (checkAuth()) {
                loadOrders();
            }
        });
    </script>
</body>
</html>
